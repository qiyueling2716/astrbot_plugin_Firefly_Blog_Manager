name: astrbot_plugin_Firefly_Blog_Manager
display_name: Firefly 博客管理
short_desc: 用自然语言指令管理 Firefly 博客的文章与部署
desc: |
  将 Firefly 博客的日常操作封装为 AstrBot AI Agent 可调用的工具。
  支持创建、删除、列出、查看、更新、搜索文章，以及环境检查、依赖安装、构建、部署等完整工作流。
  提供 local_build、remote_build、local_only 三种部署模式，适配本地、远端及混合部署场景。
author: 月凌
version: 1.0.0
repo: https://github.com/qiyueling2716/astrbot_plugin_Firefly_Blog_Manager
support_platforms: []
astrbot_version: ">=4.16"
